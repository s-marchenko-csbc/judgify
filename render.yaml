# Render Blueprint for the olymp deployment.
databases:
  - name: olympiad-db
    databaseName: olympiad
    user: olympiad
    plan: free

services:
  - type: web
    name: olympiad-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: bash ./build.sh
    startCommand: bash ./start.sh
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: olympiad-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: olympiad-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://olympiad-landing.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://olympiad-landing.onrender.com
      - key: SEED_DEMO_DATA
        value: "1"

  - type: web
    name: olympiad-landing
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://olympiad-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
