services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: judgify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d judgify"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      IN_DOCKER: "1"
      DEBUG: "${DEBUG:-1}"
      SECRET_KEY: "${SECRET_KEY:-local-docker-secret-key-change-me}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-127.0.0.1,localhost,backend}"
      DB_NAME: "${DB_NAME:-judgify}"
      DB_USER: "${DB_USER:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_HOST: "${DB_HOST:-db}"
      DB_PORT: "${DB_PORT:-5432}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-http://localhost:5173}"
      SEED_DEMO_DATA: "${SEED_DEMO_DATA:-1}"
      SECURE_SSL_REDIRECT: "${SECURE_SSL_REDIRECT:-0}"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
